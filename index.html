<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeatSight</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: 'Syne', sans-serif;
  background: #2f3542;
  color: #f0f0f0;
  height: 100dvh;
  padding: clamp(14px, 1.9vw, 22px);
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 1.2vh, 16px);
  width: min(100%, 1200px);
  margin: 0 auto;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.pulse-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #00e5a0;
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.4; }
}

.title { font-size: 20px; font-weight: 800; letter-spacing: 0.04em; }
.subtitle { display: none; }

.upload-zone {
  border: 1.5px dashed #4b5568;
  border-radius: 16px;
  padding: clamp(0.9rem, 1.9vh, 1.2rem);
  flex-shrink: 0;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag { border-color: #00e5a0; background: rgba(0,229,160,0.06); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-label { font-size: 14px; font-weight: 700; color: #f2f2f2; margin-bottom: 3px; }
.upload-hint { font-size: 10px; color: #b7bfcc; font-family: 'Space Mono', monospace; }

.upload-zone.collapsed {
  padding: 10px 14px;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.upload-zone.collapsed .upload-icon,
.upload-zone.collapsed .upload-hint {
  display: none;
}
.upload-zone.collapsed .upload-label {
  margin-bottom: 0;
  font-size: 12px;
  color: #d9e0ea;
}

.track-info {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
}
.track-icon { font-size: 18px; }
.track-name { font-size: 14px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-dur { font-size: 11px; color: #c3cad5; font-family: 'Space Mono', monospace; }

.mode-row {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.mode-btn {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 5px 12px;
  border-radius: 20px;
  border: 0.5px solid #4b5568;
  background: transparent;
  color: #d2d8e2;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active { border-color: #00e5a0; color: #00e5a0; background: rgba(0,229,160,0.10); }

.viz-container {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  border: 0.5px solid #40495a;
  overflow: hidden;
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
}
canvas { display: block; width: 100%; height: 100%; }
.beat-flash {
  position: absolute; inset: 0;
  border-radius: 16px;
  pointer-events: none;
  opacity: 0;
  border: 2px solid #00e5a0;
  transition: opacity 0.07s;
}
.no-audio-msg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #b7bfcc;
  font-family: 'Space Mono', monospace;
  pointer-events: none;
}

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.play-btn, .caption-btn {
  height: 46px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.play-btn {
  width: 46px;
  background: #00e5a0;
}
.play-btn:hover, .caption-btn:hover { transform: scale(1.04); }
.play-btn:active, .caption-btn:active { transform: scale(0.96); }
.play-btn:disabled, .caption-btn:disabled { background: #414a5d; color: #c0c7d2; cursor: default; transform: none; }
.play-btn svg { fill: #0a0a0f; }
.play-btn:disabled svg { fill: #c0c7d2; }

.caption-btn {
  min-width: 116px;
  padding: 0 16px;
  background: rgba(255,255,255,0.08);
  color: #f0f0f0;
  border: 0.5px solid #4b5568;
  font: 700 11px 'Space Mono', monospace;
}
.caption-btn.active {
  background: rgba(0,229,160,0.12);
  color: #00e5a0;
  border-color: #00e5a0;
}

.progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.time-row { display: flex; justify-content: space-between; font-size: 10px; color: #d2d8e2; font-family: 'Space Mono', monospace; }
.progress-bar { height: 4px; background: #4b5568; border-radius: 2px; cursor: pointer; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #00e5a0, #00b4ff); width: 0%; transition: width 0.1s linear; }

.caption-panel {
  flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  border: 0.5px solid #40495a;
  padding: 10px 12px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px 12px;
  align-items: start;
}
.caption-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.caption-select {
  height: 34px;
  border-radius: 999px;
  border: 0.5px solid #4b5568;
  background: rgba(255,255,255,0.08);
  color: #f0f0f0;
  padding: 0 12px;
  font: 11px 'Space Mono', monospace;
  min-width: 118px;
}
.caption-status {
  font: 11px 'Space Mono', monospace;
  color: #b7bfcc;
}
.dual-toggle {
  height: 34px;
  padding: 0 14px;
  border-radius: 999px;
  border: 0.5px solid #4b5568;
  background: rgba(255,255,255,0.08);
  color: #f0f0f0;
  font: 11px 'Space Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}
.dual-toggle.active {
  border-color: #00e5a0;
  color: #00e5a0;
  background: rgba(0,229,160,0.10);
}
.caption-display {
  min-height: 74px;
  background: rgba(0,0,0,0.16);
  border-radius: 12px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.caption-line {
  font-size: 14px;
  line-height: 1.35;
  color: #ffffff;
  word-break: break-word;
}
.caption-line.secondary {
  color: #cfd8e6;
  font-size: 12px;
}
.caption-placeholder {
  color: #9ca8ba;
  font: 11px 'Space Mono', monospace;
}
.caption-badge {
  display: inline-flex;
  align-self: flex-start;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(0,229,160,0.12);
  color: #00e5a0;
  font: 10px 'Space Mono', monospace;
}
.caption-badge.off {
  background: rgba(255,255,255,0.08);
  color: #b7bfcc;
}

.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  flex-shrink: 0;
}
.metric-card {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  border: 0.5px solid #40495a;
  padding: 10px;
  text-align: center;
  min-width: 0;
}
.metric-card.beat-card {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bpm-num { font-size: 24px; font-weight: 800; color: #00e5a0; font-family: 'Space Mono', monospace; line-height: 1; margin-bottom: 4px; }
.metric-label { font-size: 9px; color: #d2d8e2; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.beat-dots {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  justify-items: center;
  margin-bottom: 8px;
}
.beat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #414a5d;
  transition: background 0.06s, transform 0.06s;
}
.beat-dot.on { background: #00e5a0; transform: scale(1.35); }
.meter-bar-wrap { height: 6px; background: #4b5568; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.meter-bar { height: 100%; border-radius: 3px; width: 0%; transition: width 0.05s; }
.bass-bar { background: #ff4d6d; }
.mid-bar  { background: #ffd166; }
.high-bar { background: #00e5a0; }
.meter-val { font-size: 16px; font-weight: 800; }
.bass-val { color: #ff4d6d; }
.mid-val  { color: #ffd166; }
.high-val { color: #00e5a0; }

.hidden-audio { display: none; }

@media (max-width: 980px) {
  body {
    width: 100%;
    padding: 12px;
    gap: 10px;
  }
  .mode-row { gap: 6px; }
  .mode-btn { flex: 1 1 auto; text-align: center; }
  .caption-panel { grid-template-columns: 1fr; }
}

@media (max-width: 700px) {
  body { overflow: auto; height: auto; min-height: 100dvh; padding: 12px; }
  .viz-container { min-height: 34vh; }
  .metrics-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .controls { flex-wrap: wrap; }
  .caption-btn { min-width: 100px; }
}

.lang-pills {
  display: inline-flex;
  gap: 6px;
  padding: 3px;
  border-radius: 999px;
  background: rgba(255,255,255,0.10);
  border: 0.5px solid #4b5568;
}

.lang-pill {
  height: 34px;
  padding: 0 12px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: #f0f0f0;
  font: 11px 'Space Mono', monospace;
  cursor: pointer;
}

.lang-pill.active {
  background: #ffffff;
  color: #000000;
}


.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.header .title { flex: 1; }
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: 0.5px solid #4b5568;
  background: rgba(255,255,255,0.08);
  color: #f0f0f0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover {
  background: rgba(255,255,255,0.14);
  transform: scale(1.03);
}
.media-stage {
  display: grid;
  grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
  gap: 12px;
  flex: 1 1 auto;
  min-height: 0;
}
.video-panel {
  position: relative;
  min-height: 0;
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  border: 0.5px solid #40495a;
  overflow: hidden;
}
.video-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
  color: #d9e0ea;
}
.video-placeholder-title {
  font: 700 15px 'Syne', sans-serif;
  margin-bottom: 6px;
}
.video-placeholder-text {
  font: 11px 'Space Mono', monospace;
  color: #b7bfcc;
  max-width: 34ch;
}
.youtube-frame {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #111827;
}
.settings-modal {
  position: fixed;
  top: 76px;
  right: max(18px, calc((100vw - min(100vw, 1200px)) / 2 + 18px));
  width: min(560px, calc(100vw - 36px));
  max-height: calc(100dvh - 96px);
  overflow: auto;
  z-index: 40;
  background: #394252;
  border: 1px solid #4b5568;
  border-radius: 18px;
  box-shadow: 0 22px 60px rgba(0,0,0,0.35);
  padding: 16px;
}
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(7, 10, 16, 0.48);
  z-index: 35;
}
.settings-modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}
.settings-title {
  font: 800 18px 'Syne', sans-serif;
}
.settings-subtitle {
  font: 11px 'Space Mono', monospace;
  color: #c3cad5;
  margin-top: 3px;
}
.settings-section {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid #4b5568;
  border-radius: 14px;
  padding: 12px;
}
.settings-section + .settings-section {
  margin-top: 12px;
}
.settings-section-title {
  font: 700 12px 'Space Mono', monospace;
  color: #f4f7fb;
  margin-bottom: 10px;
}
.settings-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.settings-row-wrap {
  flex-wrap: wrap;
}
.settings-row-stack {
  flex-direction: column;
  align-items: stretch;
}
.youtube-input {
  width: 100%;
  height: 42px;
  border-radius: 12px;
  border: 0.5px solid #4b5568;
  background: rgba(255,255,255,0.08);
  color: #ffffff;
  padding: 0 12px;
  font: 12px 'Space Mono', monospace;
  outline: none;
}
.youtube-input::placeholder {
  color: #b7bfcc;
}
.youtube-status {
  min-height: 16px;
  color: #b7bfcc;
  font: 11px 'Space Mono', monospace;
}
.caption-btn.secondary {
  min-width: 110px;
}
@media (max-width: 900px) {
  body {
    overflow: auto;
    min-height: 100dvh;
    height: auto;
  }
  .media-stage {
    grid-template-columns: 1fr;
    flex: 0 0 auto;
  }
  .viz-container {
    min-height: 300px;
  }
  .video-panel {
    min-height: 240px;
  }
  .settings-modal {
    top: 12px;
    right: 12px;
    max-height: calc(100dvh - 24px);
  }
}


.media-stage.video-hidden {
  grid-template-columns: minmax(0, 1fr);
}


.source-status {
  flex-shrink: 0;
  font: 11px 'Space Mono', monospace;
  color: #c3cad5;
  margin-top: -4px;
}
.video-placeholder-text:empty { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="pulse-dot"></div>
    <span class="title">BeatSight</span>
  </div>
  <button class="icon-btn settings-btn" id="settingsBtn" aria-label="Open settings" title="Settings">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94L14.4 2.8a.5.5 0 0 0-.49-.4h-3.82a.5.5 0 0 0-.49.4l-.36 2.52c-.58.22-1.12.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.51.41 1.05.72 1.63.94l.36 2.52a.5.5 0 0 0 .49.4h3.82a.5.5 0 0 0 .49-.4l.36-2.52c.58-.22 1.12-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
    </svg>
  </button>
</div>

<div class="upload-zone" id="uploadZone">
  <input type="file" accept="audio/*" id="fileInput">
  <div class="upload-icon">♪</div>
  <div class="upload-label">Drop your audio file here</div>
  <div class="upload-hint">click to browse · MP3 · WAV · OGG · M4A</div>
</div>

<div class="track-info" id="trackInfo">
  <span class="track-icon">♫</span>
  <span class="track-name" id="trackName">—</span>
  <span class="track-dur" id="trackDur">0:00</span>
</div>
<div class="source-status" id="sourceStatus">Audio source: MP3 / audio file</div>

<div class="mode-row">
  <button class="mode-btn active" data-mode="wave">WAVE</button>
  <button class="mode-btn" data-mode="bars">BARS</button>
  <button class="mode-btn" data-mode="radial">RADIAL</button>
  <button class="mode-btn" data-mode="pulse">PULSE</button>
  <button class="mode-btn" data-mode="mirror">MIRROR</button>
  <button class="mode-btn" data-mode="rings">RINGS</button>
  <button class="mode-btn" data-mode="grid">GRID</button>
  <button class="mode-btn" data-mode="spectrum">SPECTRUM</button>
  <button class="mode-btn" data-mode="scope">SCOPE</button>
  <button class="mode-btn" data-mode="particles">PARTICLES</button>
  <button class="mode-btn" data-mode="tunnel">TUNNEL</button>
  <button class="mode-btn" data-mode="stereo">STEREO</button>
</div>

<div class="media-stage video-hidden">
  <div class="viz-container">
    <canvas id="vizCanvas"></canvas>
    <div class="beat-flash" id="beatFlash"></div>
    <div class="no-audio-msg" id="noAudioMsg">load a track to begin</div>
  </div>

  <div class="video-panel" id="videoPanel" hidden>
    <div class="video-placeholder" id="videoPlaceholder">
      <div class="video-placeholder-title">Video</div>
      <div class="video-placeholder-text"></div>
    </div>
    <iframe id="youtubeFrame" class="youtube-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen hidden></iframe>
    <video id="localVideo" class="youtube-frame" controls playsinline hidden></video>
  </div>
</div>

<div class="controls">
  <button class="play-btn" id="playBtn" disabled>
    <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <div class="progress-wrap">
    <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="totTime">0:00</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<div class="caption-panel">
  <div class="caption-toolbar">
    
    <span class="caption-status" id="captionStatus"></span>
  </div>
  <div class="caption-display">
    <span class="caption-badge off" id="captionModeBadge">OFF</span>
    <div class="caption-line" id="captionEnglish"><span class="caption-placeholder">Captions will appear here</span></div>
    <div class="caption-line secondary" id="captionOriginal"></div>
    <div class="caption-line secondary" id="captionSecondary"></div>
  </div>
</div>

<div class="metrics-row">
  <div class="metric-card beat-card">
    <div class="metric-label">Beat Pulse</div>
    <div class="bpm-num" id="bpmNum">—</div>
    <div class="beat-dots" id="beatDots">
      <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
      <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
    </div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Bass</div>
    <div class="meter-bar-wrap"><div class="meter-bar bass-bar" id="bassBar"></div></div>
    <div class="meter-val bass-val" id="bassVal">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Mid</div>
    <div class="meter-bar-wrap"><div class="meter-bar mid-bar" id="midBar"></div></div>
    <div class="meter-val mid-val" id="midVal">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">High</div>
    <div class="meter-bar-wrap"><div class="meter-bar high-bar" id="highBar"></div></div>
    <div class="meter-val high-val" id="highVal">0</div>
  </div>
</div>


<div class="modal-backdrop" id="settingsBackdrop" hidden></div>
<div class="settings-modal" id="settingsModal" hidden>
  <div class="settings-modal-header">
    <div>
      <div class="settings-title">Settings</div>
      <div class="settings-subtitle">Subtitles, captions, and YouTube video</div>
    </div>
    <button class="icon-btn modal-close-btn" id="settingsCloseBtn" aria-label="Close settings">✕</button>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Captions</div>
    <div class="settings-row settings-row-wrap">
      <button class="caption-btn" id="captionToggleBtn" disabled>CAPTIONS OFF</button>
      <button class="caption-btn" id="subtitleLoadBtn">LOAD VTT/SRT</button>
      <button class="caption-btn secondary" id="subtitleFile2Btn">LOAD 2ND SUB</button>
      <button class="dual-toggle" id="dualSubtitleToggleBtn">DUAL OFF</button>
      <div class="lang-pills" id="captionLangPills">
        <button type="button" class="lang-pill active" data-lang="auto">AUTO</button>
        <button type="button" class="lang-pill" data-lang="en">EN</button>

        args: []
      }), '*');

function syncVideoSeek(timeInSeconds) {
  try {

    if (!youtubeFrame.hidden && youtubeFrame.src) {
      youtubeFrame.contentWindow?.postMessage(JSON.stringify({
        event: 'command',
        func: 'seekTo',

function filterProfanity(text) {
  if (!text) return '';
  const patterns = [
    /\bfuck(?:ing|ed|er|ers)?\b/gi,
    /\bshit(?:ty|ting|ted|s)?\b/gi,
    /\bbitch(?:es)?\b/gi,
    /\basshole(?:s)?\b/gi,
    /\bdamn\b/gi,
    /\bmotherfucker(?:s)?\b/gi
  ];
  let out = text;
  patterns.forEach(re => { out = out.replace(re, '[---]'); });
  return out;
}

async function ensureAudioContext() {

      syncPlayerStateFromMedia();
      currentRenderedCueKey = '';
      updateDisplayedCaption(true);
    }

  el.addEventListener('seeking', () => {
    if ((el === audioEl && currentAudioSourceType === 'audio') || (el === localVideo && currentAudioSourceType === 'video')) {
      currentRenderedCueKey = '';
      refreshProgressFromActiveMedia();
      updateDisplayedCaption(true);

  el.addEventListener('seeked', () => {
    if ((el === audioEl && currentAudioSourceType === 'audio') || (el === localVideo && currentAudioSourceType === 'video')) {

      currentRenderedCueKey = '';

function normalizeCueText(text) {
  return String(text || '')
    .replace(/\r/g, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&nbsp;/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function parseTimestamp(raw) {
  const value = String(raw || '').trim().replace(',', '.');
  const parts = value.split(':').map(Number);
  if (parts.some(Number.isNaN)) return NaN;
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return NaN;
}

function parseVttOrSrt(text) {
  const cleaned = String(text || '').replace(/^\uFEFF/, '').replace(/\r/g, '');
  const blocks = cleaned.split(/\n\s*\n/);
  const cues = [];
  for (const block of blocks) {
    const lines = block.split('\n').map(line => line.trimEnd());
    if (!lines.length) continue;
    let i = 0;
    if (/^WEBVTT/i.test(lines[0])) continue;
    if (/^NOTE($|\s)/i.test(lines[0])) continue;
    if (/^\d+$/.test(lines[0].trim())) i = 1;
    if (!lines[i] || !lines[i].includes('-->')) continue;
    const [startRaw, endRaw] = lines[i].split(/\s+-->\s+/);
    const start = parseTimestamp(startRaw);
    const end = parseTimestamp((endRaw || '').split(/\s+/)[0]);
    if (!Number.isFinite(start) || !Number.isFinite(end) || end < start) continue;
    const textLines = lines.slice(i + 1).filter(Boolean);
    const cueText = normalizeCueText(textLines.join(' '));
    if (!cueText) continue;
    cues.push({ start, end, text: cueText });
  }
  return cues.sort((a, b) => a.start - b.start);
}

function guessCueLanguage(text) {
  const selected = captionLangSelect.value;
  if (selected !== 'auto') return selected.toLowerCase();
  const sample = ' ' + String(text || '').toLowerCase() + ' ';
  const spanishHints = [' el ', ' la ', ' que ', ' de ', ' y ', ' no ', ' por ', ' con ', ' para ', ' una ', ' un ', ' yo ', ' tu ', ' te ', ' lo ', ' me ', ' mi ', ' se ', ' en ', ' es ', ' como ', ' pero ', ' corazón', 'ción', 'ñ'];
  const score = spanishHints.reduce((acc, hint) => acc + (sample.includes(hint) ? 1 : 0), 0);
  return score >= 2 ? 'es' : 'en';
}

async function getTranslator(sourceLanguage) {
  const lang = (sourceLanguage || 'en').toLowerCase();
  const key = lang + '->en';
  if (translatorCache.has(key)) return translatorCache.get(key);
  if (typeof Translator === 'undefined' || !window.isSecureContext || lang.startsWith('en')) {
    translatorCache.set(key, null);
    return null;
  }
  try {
    if (typeof Translator.availability === 'function') {
      const availability = await Translator.availability({ sourceLanguage: lang, targetLanguage: 'en' });
      if (availability === 'unavailable') {
        translatorCache.set(key, null);
        return null;
      }
    }
    const translator = await Translator.create({ sourceLanguage: lang, targetLanguage: 'en' });
    translatorCache.set(key, translator);
    return translator;
  } catch (e) {
    translatorCache.set(key, null);
    return null;
  }
}

async function translateCueText(text, sourceLanguage) {
  const lang = (sourceLanguage || 'en').toLowerCase();
  if (!text) return text;
  if (lang.startsWith('en')) return text;
  const translator = await getTranslator(lang);
  if (!translator) return null;
  try {
    return await translator.translate(text);
  } catch (e) {
    return null;
  }
}

function renderCaption(englishText, originalText, secondaryText, badgeText = 'CAPTIONS') {
  const cleanEnglish = filterProfanity(englishText || '');
  const cleanOriginal = filterProfanity(originalText || '');
  const cleanSecondary = filterProfanity(secondaryText || '');
  captionEnglish.textContent = cleanEnglish || '…';

  if (cleanOriginal && cleanOriginal.trim().toLowerCase() !== cleanEnglish.trim().toLowerCase()) {
    captionOriginal.textContent = cleanOriginal;
  } else {
    captionOriginal.textContent = '';
  }

  if (dualSubtitlesEnabled && cleanSecondary) {
    const dupA = cleanSecondary.trim().toLowerCase() === cleanEnglish.trim().toLowerCase();
    const dupB = cleanSecondary.trim().toLowerCase() === cleanOriginal.trim().toLowerCase();
    captionSecondary.textContent = (dupA || dupB) ? '' : cleanSecondary;
  } else {
    captionSecondary.textContent = '';
  }

  setCaptionBadge(badgeText, true);
}

async function updateDisplayedCaption(force = false) {
  if (!captionsEnabled || !subtitleCues.length || !audioEl.src) {
    if (force) clearCaptions();
    return;
  }

  const t = audioEl.currentTime || 0;
  const primary = getActiveCueAtTime(subtitleCues, t);
  currentCueIndex = primary.index;

  if (!primary.cue) {
    currentCueIndex = -1;
    currentCueIndex2 = -1;
    if (force || currentRenderedCueKey !== '__blank__') {
      currentRenderedCueKey = '__blank__';
      captionEnglish.innerHTML = '<span class="caption-placeholder">Waiting for next caption…</span>';
      captionOriginal.textContent = activeSubtitleName ? activeSubtitleName : '';
      captionSecondary.textContent = dualSubtitlesEnabled && activeSubtitleName2 ? activeSubtitleName2 : '';
      setCaptionBadge('READY', true);
    }
    return;
  }

  const secondary = dualSubtitlesEnabled && subtitleCues2.length ? getActiveCueAtTime(subtitleCues2, t) : { cue: null, index: -1 };
  currentCueIndex2 = secondary.index;

  const primaryCue = primary.cue;
  const secondaryCue = secondary.cue;
  const cueKey = [
    primary.index, primaryCue.start, primaryCue.end, primaryCue.text,
    secondary.index, secondaryCue ? secondaryCue.start : '', secondaryCue ? secondaryCue.end : '', secondaryCue ? secondaryCue.text : '',
    dualSubtitlesEnabled ? 'dual' : 'single'
  ].join('|');

  if (!force && currentRenderedCueKey === cueKey) return;
  currentRenderedCueKey = cueKey;

  const detectedLanguage = guessCueLanguage(primaryCue.text);
  const translated = await translateCueText(primaryCue.text, detectedLanguage);
  const englishText = translated || primaryCue.text;

  let secondaryText = '';
  if (secondaryCue) {
    secondaryText = secondaryCue.text;
  }

  let originalText = translated ? primaryCue.text : '';
  if (!translated && dualSubtitlesEnabled && secondaryCue) {
    originalText = primaryCue.text;
  }

  let badge = translated ? 'TRANSLATED' : (detectedLanguage.startsWith('en') ? 'ENGLISH' : 'ORIGINAL');
  if (dualSubtitlesEnabled && secondaryCue) badge = translated ? 'DUAL + EN' : 'DUAL';

  renderCaption(englishText, originalText, secondaryText, badge);

  if (dualSubtitlesEnabled && secondaryCue) {
    setCaptionStatus(`dual subtitles active · ${activeSubtitleName}${activeSubtitleName2 ? ' + ' + activeSubtitleName2 : ''}`);
  } else {
    setCaptionStatus(
      translated
        ? 'subtitle translated to English'
        : detectedLanguage.startsWith('en')
          ? 'subtitle already in English'
          : 'showing original subtitle text'
    );
  }
}

function stopCaptions(updateUi = true) {
  currentCueIndex = -1;
  currentRenderedCueKey = '';
  if (updateUi) {
    captionToggleBtn.textContent = 'CAPTIONS OFF';
    captionToggleBtn.classList.remove('active');
    setCaptionBadge('OFF', false);
    setCaptionStatus(subtitleCues.length ? 'captions off' : '');
  }
}

async function loadSubtitleFile(file, which = 1) {
  const rawText = await file.text();
  const cues = parseVttOrSrt(rawText);
  if (!cues.length) {
    setCaptionStatus('could not read subtitle cues from file');
    return;
  }
  if (which === 2) {
    subtitleCues2 = cues;
    activeSubtitleName2 = file.name;
    currentCueIndex2 = -1;
  } else {
    subtitleCues = cues;
    activeSubtitleName = file.name;
    currentCueIndex = -1;
  }
  currentRenderedCueKey = '';
  const total = (subtitleCues.length ? 1 : 0) + (subtitleCues2.length ? 1 : 0);
  const dualReady = subtitleCues.length && subtitleCues2.length;
  setCaptionStatus(
    which === 2
      ? `second subtitle loaded · ${file.name}`
      : `subtitle loaded · ${file.name}`
  );
  if (dualReady && dualSubtitlesEnabled) {
    setCaptionStatus(`dual subtitles ready · ${activeSubtitleName} + ${activeSubtitleName2}`);
  } else if (total > 1) {
    setCaptionStatus(`two subtitle files loaded · turn dual on when ready`);
  }
  clearCaptions();
  if (captionsEnabled) updateDisplayedCaption(true);
}

function getActiveCueAtTime(cues, t) {
  for (let i = 0; i < cues.length; i++) {
    const cue = cues[i];
    if (t >= cue.start && t <= cue.end) return { cue, index: i };
    if (cue.start > t) break;
  }
  return { cue: null, index: -1 };
}

function draw() {
  window._animFrame = requestAnimationFrame(draw);
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;

  if (!analyser) {
    ctx2.save();
    ctx2.scale(dpr, dpr);
    ctx2.clearRect(0, 0, W, H);
    ctx2.restore();
    return;
  }

  const bufLen = analyser.frequencyBinCount;
  const freqData = new Uint8Array(bufLen);
  const timeData = new Uint8Array(analyser.fftSize);
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const bassEnd = Math.max(1, Math.floor(bufLen * 0.05));
  const midEnd  = Math.max(bassEnd + 1, Math.floor(bufLen * 0.3));
  let bSum = 0, mSum = 0, hSum = 0;
  for (let i = 0; i < bassEnd; i++) bSum += freqData[i];
  for (let i = bassEnd; i < midEnd; i++) mSum += freqData[i];
  for (let i = midEnd; i < bufLen; i++) hSum += freqData[i];

  const bassLvl = Math.round(bSum / bassEnd);
  const midLvl  = Math.round(mSum / Math.max(1, midEnd - bassEnd));
  const highLvl = Math.round(hSum / Math.max(1, bufLen - midEnd));
  const avgLvl = Math.round((bassLvl + midLvl + highLvl) / 3);

  document.getElementById('bassBar').style.width = Math.round(bassLvl / 2.55) + '%';
  document.getElementById('midBar').style.width  = Math.round(midLvl / 2.55) + '%';
  document.getElementById('highBar').style.width = Math.round(highLvl / 2.55) + '%';
  document.getElementById('bassVal').textContent = bassLvl;
  document.getElementById('midVal').textContent  = midLvl;
  document.getElementById('highVal').textContent = highLvl;

  if (bassLvl > 110 && bassLvl > lastBassLevel * 1.12) {
    const now = performance.now();
    if (now - lastBeatTime > 220) {
      if (lastBeatTime > 0) {
        beatHistory.push(now - lastBeatTime);
        if (beatHistory.length > 12) beatHistory.shift();
        const avg = beatHistory.reduce((a,b) => a + b, 0) / beatHistory.length;
        bpmEstimate = Math.round(60000 / avg);
        bpmNum.textContent = bpmEstimate;
      }
      lastBeatTime = now;
      beatFlash.style.opacity = '1';
      setTimeout(() => beatFlash.style.opacity = '0', 90);
      const di = beatDotIndex % 8;
      beatDots[di].classList.add('on');
      setTimeout(() => beatDots[di].classList.remove('on'), 220);
      beatDotIndex++;
    }
  }
  lastBassLevel = bassLvl;

  ctx2.save();
  ctx2.scale(dpr, dpr);
  ctx2.clearRect(0, 0, W, H);

  if (vizMode === 'wave') drawWave(timeData, W, H, bassLvl);
  else if (vizMode === 'bars') drawBars(freqData, W, H);
  else if (vizMode === 'radial') drawRadial(freqData, timeData, W, H, bassLvl);
  else if (vizMode === 'pulse') drawPulse(W, H, bassLvl, midLvl, highLvl);
  else if (vizMode === 'mirror') drawMirror(freqData, W, H, bassLvl, highLvl);
  else if (vizMode === 'rings') drawRings(freqData, W, H, bassLvl, midLvl, highLvl);
  else if (vizMode === 'grid') drawGrid(freqData, W, H, bassLvl, avgLvl);
  else if (vizMode === 'spectrum') drawSpectrum(freqData, W, H, bassLvl, midLvl, highLvl);
  else if (vizMode === 'scope') drawScope(timeData, W, H, bassLvl, midLvl, highLvl);
  else if (vizMode === 'particles') drawParticles(freqData, W, H, bassLvl, avgLvl);
  else if (vizMode === 'tunnel') drawTunnel(freqData, W, H, bassLvl, midLvl, highLvl);
  else if (vizMode === 'stereo') drawStereo(freqData, W, H, bassLvl, midLvl, highLvl);

  ctx2.restore();
}
draw();

function drawBackground(W, H, alpha = 0.22) {
  const grad = ctx2.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, `rgba(0,229,160,${alpha})`);
  grad.addColorStop(0.5, 'rgba(0,180,255,0.06)');
  grad.addColorStop(1, 'rgba(255,77,109,0.10)');
  ctx2.fillStyle = grad;
  ctx2.fillRect(0, 0, W, H);
}
function drawWave(timeData, W, H, bassLvl) {
  drawBackground(W, H, 0.14);
  const boost = bassLvl / 255;
  const layers = [
    { color:'#00e5a0', alpha:1.0, yOff:0 },
    { color:'#00b4ff', alpha:0.3, yOff:5*boost },
    { color:'#ff4d6d', alpha:0.15, yOff:-5*boost }
  ];
  layers.forEach(l => {
    ctx2.globalAlpha = l.alpha;
    ctx2.strokeStyle = l.color;
    ctx2.lineWidth = 2.2;
    ctx2.beginPath();
    const sliceW = W / timeData.length;
    for (let i=0; i<timeData.length; i++) {
      const v = (timeData[i]/128.0)-1;
      const x = i*sliceW;
      const y = H/2 + v*H/2*(0.85+boost*0.45) + l.yOff;
      if (i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
    }
    ctx2.stroke();
  });
  ctx2.globalAlpha = 0.08;
  ctx2.strokeStyle = '#00e5a0';
  ctx2.lineWidth = 0.5;
  ctx2.beginPath(); ctx2.moveTo(0,H/2); ctx2.lineTo(W,H/2); ctx2.stroke();
  ctx2.globalAlpha = 1;
}
function drawBars(freqData, W, H) {
  drawBackground(W, H, 0.12);
  const barCount = 80;
  const slot = W / barCount;
  const barW = slot * 0.72;
  const gap = slot * 0.28;
  for (let i=0; i<barCount; i++) {
    const idx = Math.floor(i/barCount*freqData.length*0.65);
    const v = freqData[idx]/255;
    const barH = v*H*0.95;
    const x = i*(barW+gap);
    const t = i/barCount;
    const r = t<0.35 ? 255 : Math.round(255*(1-(t-0.35)/0.65));
    const g = t<0.2 ? Math.round(t*5*229) : t<0.7 ? 229 : Math.round(229*(1-(t-0.7)/0.3));
    const b = t<0.5 ? Math.round(160*(1-t*2)) : Math.round((t-0.5)*2*200);
    ctx2.globalAlpha = 0.8 + v*0.2;
    ctx2.fillStyle = `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
    const rad = Math.min(barW/2, 3);
    ctx2.beginPath();
    ctx2.roundRect(x, H-barH, barW, barH, [rad,rad,0,0]);
    ctx2.fill();
  }
  ctx2.globalAlpha = 1;
}
function drawRadial(freqData, timeData, W, H, bassLvl) {
  drawBackground(W, H, 0.10);
  const cx=W/2, cy=H/2;
  const baseR = Math.min(W,H)*0.22;
  const boost = bassLvl/255;
  ctx2.globalAlpha = 0.1+boost*0.1;
  ctx2.strokeStyle = '#00e5a0'; ctx2.lineWidth = 1;
  ctx2.beginPath(); ctx2.arc(cx,cy,baseR+boost*12,0,Math.PI*2); ctx2.stroke();
  ctx2.globalAlpha = 1;
  for (let i=0; i<90; i++) {
    const idx = Math.floor(i/90*freqData.length*0.7);
    const v = freqData[idx]/255;
    const angle = (i/90)*Math.PI*2 - Math.PI/2;
    const r1=baseR, r2=baseR+v*baseR*1.2;
    const t=i/90;
    const red = t<0.5 ? Math.round(255*t*2) : 255;
    const grn = t<0.33 ? Math.round(229*t*3) : t<0.66 ? 229 : Math.round(229*(1-(t-0.66)*3));
    const blu = t<0.5 ? Math.round(160-t*300) : Math.round((t-0.5)*2*200);
    ctx2.strokeStyle = `rgba(${clamp(red,0,255)},${clamp(grn,0,255)},${clamp(blu,0,255)},${0.5+v*0.5})`;
    ctx2.lineWidth = 2;
    ctx2.beginPath();
    ctx2.moveTo(cx+Math.cos(angle)*r1, cy+Math.sin(angle)*r1);
    ctx2.lineTo(cx+Math.cos(angle)*r2, cy+Math.sin(angle)*r2);
    ctx2.stroke();
  }
  ctx2.strokeStyle = 'rgba(0,229,160,0.7)'; ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  for (let i=0; i<=360; i++) {
    const j=Math.floor(i/360*timeData.length);
    const v=(timeData[j]/128.0-1)*0.4;
    const angle=(i/360)*Math.PI*2 - Math.PI/2;
    const r=baseR+v*baseR*(1+boost);
    const x=cx+Math.cos(angle)*r, y=cy+Math.sin(angle)*r;
    if(i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
  }
  ctx2.closePath(); ctx2.stroke();
  ctx2.fillStyle='#00e5a0';
  ctx2.font=`bold ${Math.round(11+boost*5)}px Space Mono,monospace`;
  ctx2.textAlign='center'; ctx2.textBaseline='middle';
  ctx2.globalAlpha=0.4+boost*0.6;
  ctx2.fillText(bpmEstimate>0 ? bpmEstimate+' BPM' : '♫', cx, cy);
  ctx2.globalAlpha=1;
}
function drawPulse(W, H, bassLvl, midLvl, highLvl) {
  drawBackground(W, H, 0.18);
  const cx = W / 2;
  const cy = H / 2;
  const bassScale = bassLvl / 255;
  const midScale = midLvl / 255;
  const highScale = highLvl / 255;
  const radii = [30 + bassScale * 60, 55 + midScale * 70, 85 + highScale * 80];
  const colors = ['#ff4d6d', '#ffd166', '#00e5a0'];
  radii.forEach((r, i) => {
    ctx2.globalAlpha = 0.18 + i * 0.08;
    ctx2.fillStyle = colors[i];
    ctx2.beginPath(); ctx2.arc(cx, cy, r, 0, Math.PI * 2); ctx2.fill();
  });
  ctx2.globalAlpha = 1;
  ctx2.fillStyle = '#f4f7fb';
  ctx2.font = '700 15px Space Mono, monospace';
  ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
  ctx2.fillText('PULSE', cx, cy);
}
function drawMirror(freqData, W, H, bassLvl, highLvl) {
  drawBackground(W, H, 0.14);
  const half = Math.floor(freqData.length * 0.45);
  const step = W / half;
  const centerY = H / 2;
  ctx2.strokeStyle = '#00e5a0'; ctx2.lineWidth = 1; ctx2.globalAlpha = 0.12;
  ctx2.beginPath(); ctx2.moveTo(0, centerY); ctx2.lineTo(W, centerY); ctx2.stroke();
  ctx2.globalAlpha = 1;
  for (let i = 0; i < half; i += 3) {
    const v = freqData[i] / 255;
    const x = i * step;
    const topH = v * (H * 0.42) * (1 + bassLvl / 255 * 0.4);
    const bottomH = v * (H * 0.30) * (1 + highLvl / 255 * 0.5);
    ctx2.strokeStyle = i % 2 === 0 ? '#00b4ff' : '#00e5a0';
    ctx2.lineWidth = 2;
    ctx2.beginPath(); ctx2.moveTo(x, centerY - 2); ctx2.lineTo(x, centerY - topH); ctx2.stroke();
    ctx2.strokeStyle = i % 2 === 0 ? '#ff4d6d' : '#ffd166';
    ctx2.beginPath(); ctx2.moveTo(x, centerY + 2); ctx2.lineTo(x, centerY + bottomH); ctx2.stroke();
  }
}
function drawRings(freqData, W, H, bassLvl, midLvl, highLvl) {
  drawBackground(W, H, 0.10);
  const cx = W / 2, cy = H / 2;
  [bassLvl, midLvl, highLvl].forEach((lvl, idx) => {
    const base = 35 + idx * 28;
    const amp = lvl / 255;
    const colors = ['#ff4d6d', '#ffd166', '#00e5a0'];
    ctx2.strokeStyle = colors[idx]; ctx2.lineWidth = 2.5; ctx2.globalAlpha = 0.8;
    ctx2.beginPath();
    for (let i = 0; i <= 120; i++) {
      const p = i / 120;
      const angle = p * Math.PI * 2 - Math.PI / 2;
      const sample = freqData[Math.floor(p * freqData.length * 0.55)] / 255;
      const radius = base + sample * 30 + amp * 24;
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;
      if (i === 0) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
    }
    ctx2.closePath(); ctx2.stroke();
  });
  ctx2.globalAlpha = 1;
}
function drawGrid(freqData, W, H, bassLvl, avgLvl) {
  drawBackground(W, H, 0.16);
  const cols = 12, rows = 6, gap = 8;
  const cellW = (W - gap * (cols + 1)) / cols;
  const cellH = (H - gap * (rows + 1)) / rows;
  const glow = bassLvl / 255;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = Math.floor(((r * cols + c) / (rows * cols)) * freqData.length * 0.7);
      const v = freqData[idx] / 255;
      const x = gap + c * (cellW + gap);
      const y = gap + r * (cellH + gap);
      const hueMix = (c / cols);
      const red = Math.round(255 * (1 - hueMix) * v);
      const green = Math.round(140 + 90 * v);
      const blue = Math.round(255 * hueMix * v + 100);
      ctx2.fillStyle = `rgba(${red},${green},${blue},${0.18 + v * 0.75})`;
      ctx2.beginPath();
      ctx2.roundRect(x, y, cellW, cellH * (0.45 + v * 0.7), 6);
      ctx2.fill();
    }
  }
  ctx2.strokeStyle = `rgba(255,255,255,${0.08 + glow * 0.12})`;
  ctx2.lineWidth = 1; ctx2.strokeRect(0.5, 0.5, W - 1, H - 1);
  ctx2.fillStyle = '#f4f7fb'; ctx2.globalAlpha = 0.75;
  ctx2.font = '700 12px Space Mono, monospace'; ctx2.fillText('LEVEL ' + avgLvl, 16, H - 16);
  ctx2.globalAlpha = 1;
}

  drawBackground(W, H, 0.12);
  const barCount = 56, baseY = H * 0.88, slot = W / barCount, barW = Math.max(3, slot * 0.62);
  for (let i = 0; i < barCount; i++) {
    const sample = freqData[Math.floor((i / barCount) * freqData.length * 0.82)] / 255;
    const eased = Math.pow(sample, 0.85);
    const barH = eased * H * 0.72;
    const x = i * slot + (slot - barW) / 2;
    const grad = ctx2.createLinearGradient(0, baseY - barH, 0, baseY);
    grad.addColorStop(0, 'rgba(255,77,109,0.95)');
    grad.addColorStop(0.5, 'rgba(255,209,102,0.95)');
    grad.addColorStop(1, 'rgba(0,229,160,0.95)');
    ctx2.fillStyle = grad;
    ctx2.beginPath(); ctx2.roundRect(x, baseY - barH, barW, barH, [4,4,0,0]); ctx2.fill();
  }
  const peak = Math.max(bassLvl, midLvl, highLvl);

  ctx2.font = '700 12px Space Mono, monospace'; ctx2.fillText('SPECTRUM ' + peak, 16, 18);

    { color: '#00e5a0', alpha: 1, amp: 0.42 + bassLvl / 255 * 0.2, offset: 0 },
    { color: '#00b4ff', alpha: 0.55, amp: 0.28 + midLvl / 255 * 0.16, offset: -H * 0.18 },
    { color: '#ff4d6d', alpha: 0.35, amp: 0.22 + highLvl / 255 * 0.16, offset: H * 0.18 }

    ctx2.strokeStyle = line.color; ctx2.globalAlpha = line.alpha; ctx2.lineWidth = 2; ctx2.beginPath();
    for (let i = 0; i < timeData.length; i++) {
      const x = (i / (timeData.length - 1)) * W;

      const y = H / 2 + line.offset + v * (H * line.amp);
      if (i === 0) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
    }
    ctx2.stroke();
  });

  for (let i = 1; i < 4; i++) { const y = (H / 4) * i; ctx2.beginPath(); ctx2.moveTo(0, y); ctx2.lineTo(W, y); ctx2.stroke(); }

function drawParticles(freqData, W, H, bassLvl, avgLvl) {

function drawTunnel(freqData, W, H, bassLvl, midLvl, highLvl) {
  drawBackground(W, H, 0.09);
  const cx = W / 2, cy = H / 2, rings = 18, maxR = Math.min(W, H) * 0.56;
  for (let i = rings; i >= 1; i--) {
    const t = i / rings;
    const idx = Math.floor(t * freqData.length * 0.72);
    const energy = freqData[idx] / 255;
    const r = maxR * t * (0.42 + energy * 0.65);
    ctx2.strokeStyle = i % 3 === 0 ? 'rgba(0,229,160,0.85)' : (i % 3 === 1 ? 'rgba(0,180,255,0.75)' : 'rgba(255,77,109,0.72)');
    ctx2.lineWidth = 1 + energy * 3;
    ctx2.beginPath(); ctx2.ellipse(cx, cy, r, r * (0.55 + midLvl / 255 * 0.2), 0, 0, Math.PI * 2); ctx2.stroke();
  }
  const flare = (bassLvl + highLvl) / 510;
  ctx2.globalAlpha = 0.2 + flare * 0.35; ctx2.fillStyle = '#f4f7fb';
  ctx2.fillRect(cx - 1, 0, 2, H); ctx2.fillRect(0, cy - 1, W, 2); ctx2.globalAlpha = 1;
}
function drawStereo(freqData, W, H, bassLvl, midLvl, highLvl) {
  drawBackground(W, H, 0.14);
  const centerGap = Math.max(12, W * 0.02);
  const leftWidth = (W - centerGap) / 2;
  const rightX = leftWidth + centerGap;
  const bars = 22;
  for (let i = 0; i < bars; i++) {
    const idxL = Math.floor((i / bars) * freqData.length * 0.35);
    const idxR = Math.floor((0.35 + i / bars * 0.35) * freqData.length);
    const vL = freqData[idxL] / 255;
    const vR = freqData[idxR] / 255;
    const y = H - ((i + 1) / bars) * H * 0.92;
    const h = H / bars * 0.68;
    ctx2.fillStyle = 'rgba(0,229,160,' + (0.18 + vL * 0.72) + ')';
    ctx2.beginPath(); ctx2.roundRect(leftWidth - vL * leftWidth, y, vL * leftWidth, h, 5); ctx2.fill();
    ctx2.fillStyle = 'rgba(0,180,255,' + (0.18 + vR * 0.72) + ')';
    ctx2.beginPath(); ctx2.roundRect(rightX, y, vR * leftWidth, h, 5); ctx2.fill();
  }
  ctx2.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx2.beginPath(); ctx2.moveTo(leftWidth + centerGap / 2, 0); ctx2.lineTo(leftWidth + centerGap / 2, H); ctx2.stroke();
  ctx2.fillStyle = '#f4f7fb'; ctx2.font = '700 12px Space Mono, monospace';
  ctx2.fillText('L', 14, 18); ctx2.fillText('R', W - 24, 18);
}

const captionLangPills = document.getElementById('captionLangPills');
captionLangPills?.addEventListener('click', e => {
  const btn = e.target.closest('.lang-pill');
  if (!btn) return;
  const lang = btn.dataset.lang;
  document.getElementById('captionLangSelect').value = lang;
  document.querySelectorAll('.lang-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentRenderedCueKey = '';
  updateDisplayedCaption(true);
});


settingsBtn.addEventListener('click', openSettings);
settingsCloseBtn.addEventListener('click', closeSettings);
settingsBackdrop.addEventListener('click', closeSettings);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !settingsModal.hidden) closeSettings();
});

youtubeFrame.addEventListener('load', () => {
  if (youtubeFrame.src) {
    youtubeFrame.hidden = false;
    videoPlaceholder.hidden = true;
    setTimeout(() => syncVideoToAudioState(), 900);
    setTimeout(() => syncVideoToAudioState(), 1700);
  }
});

youtubeLoadBtn.addEventListener('click', loadYouTubeVideo);
videoUploadBtn.addEventListener('click', () => videoFileInput.click());
videoFileInput.addEventListener('change', e => {
  if (e.target.files && e.target.files[0]) loadLocalVideoFile(e.target.files[0]);
});
youtubeClearBtn.addEventListener('click', clearYouTubeVideo);
youtubeUrlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    loadYouTubeVideo();
  }
});


[audioEl, localVideo].forEach(el => {
  if (!el) return;
  el.addEventListener('play', () => {
    if ((el === localVideo && currentAudioSourceType === 'video') || (el === audioEl && currentAudioSourceType === 'audio')) {
      syncPlayerStateFromMedia();
      cancelAnimationFrame(animFrame);
      draw();
    }
  });
  el.addEventListener('pause', () => {
    if ((el === localVideo && currentAudioSourceType === 'video') || (el === audioEl && currentAudioSourceType === 'audio')) {
      syncPlayerStateFromMedia();
    }
  });
  el.addEventListener('ended', () => {
    if ((el === localVideo && currentAudioSourceType === 'video') || (el === audioEl && currentAudioSourceType === 'audio')) {
      syncPlayerStateFromMedia();
      progressFill.style.width = '0%';
      curTimeEl.textContent = '0:00';
      if (currentAudioSourceType === 'audio') {
        syncVideoPause();
        syncVideoSeek(0);
      }
    }
  });
  el.addEventListener('loadedmetadata', () => {
    if ((el === localVideo && currentAudioSourceType === 'video') || (el === audioEl && currentAudioSourceType === 'audio')) {
      updateTrackDisplay(document.getElementById('trackName').textContent || '—', el.duration || 0);
    }
  });
  el.addEventListener('timeupdate', () => {
    if ((el === localVideo && currentAudioSourceType === 'video') || (el === audioEl && currentAudioSourceType === 'audio')) {
      pauseOffset = el.currentTime || 0;
    }
  });
});


audioEl.addEventListener('seeked', () => {
  if (currentAudioSourceType === 'audio') {
    pauseOffset = audioEl.currentTime || 0;
    refreshProgressFromActiveMedia();
    currentRenderedCueKey = '';
    updateDisplayedCaption(true);
    syncVideoSeek(pauseOffset);
  }
});
localVideo.addEventListener('seeked', () => {
  if (currentAudioSourceType === 'video') {
    pauseOffset = localVideo.currentTime || 0;
    refreshProgressFromActiveMedia();
    currentRenderedCueKey = '';
    updateDisplayedCaption(true);
  }
});

</script>
