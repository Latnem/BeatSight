<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeatSight — NUEVAYoL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Syne', sans-serif;
  background: #2f3542;
  color: #f0f0f0;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(100%, 1280px);
  margin: 0 auto;
  padding: 18px;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.pulse-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00e5a0;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.4; }
}
.title { font-size: 20px; font-weight: 800; letter-spacing: 0.04em; }
.subtitle {
  margin-left: auto;
  font: 11px 'Space Mono', monospace;
  color: #d2d8e2;
}

.track-info {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
}
.track-icon { font-size: 18px; }
.track-name {
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-dur {
  font-size: 11px;
  color: #c3cad5;
  font-family: 'Space Mono', monospace;
}

.mode-row {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.mode-btn {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 5px 12px;
  border-radius: 20px;
  border: 0.5px solid #4b5568;
  background: transparent;
  color: #d2d8e2;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active {
  border-color: #00e5a0;
  color: #00e5a0;
  background: rgba(0,229,160,0.10);
}

.media-stage {
  display: grid;
  grid-template-columns: minmax(0, 1.12fr) minmax(360px, 0.88fr);
  gap: 12px;
  flex: 1 1 auto;
  min-height: 0;
}

.viz-container,
.video-panel {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  border: 0.5px solid #40495a;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.beat-flash {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  pointer-events: none;
  opacity: 0;
  border: 2px solid #00e5a0;
  transition: opacity 0.07s;
}

.video-zoom-controls {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  z-index: 10;
}
.video-zoom-controls button {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: none;
  background: rgba(0,0,0,0.60);
  color: #ffffff;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
}
.video-zoom-controls button:hover {
  background: rgba(0,0,0,0.82);
}

.youtube-frame {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #111827;
}

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.play-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #00e5a0;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, background 0.15s;
  flex-shrink: 0;
}
.play-btn:hover { transform: scale(1.05); background: #00ffb3; }
.play-btn:active { transform: scale(0.95); }
.play-btn svg { fill: #0a0a0f; }

.progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #d2d8e2;
  font-family: 'Space Mono', monospace;
}
.progress-bar {
  height: 6px;
  background: #4b5568;
  border-radius: 999px;
  cursor: pointer;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #00e5a0, #00b4ff);
  width: 0%;
  transition: width 0.08s linear;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  flex-shrink: 0;
}
.metric-card {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  border: 0.5px solid #40495a;
  padding: 12px;
  text-align: center;
}
.metric-label {
  font-size: 10px;
  color: #d2d8e2;
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.metric-bar-wrap {
  height: 6px;
  background: #4b5568;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}
.metric-bar {
  height: 100%;
  border-radius: 3px;
  width: 0%;
  transition: width 0.05s;
}
.bass-bar { background: #ff4d6d; }
.mid-bar  { background: #ffd166; }
.high-bar { background: #00e5a0; }
.metric-val {
  font-size: 18px;
  font-weight: 800;
}
.bass-val { color: #ff4d6d; }
.mid-val { color: #ffd166; }
.high-val { color: #00e5a0; }
.pulse-grid {
  display: flex;
  gap: 7px;
  justify-content: center;
  align-items: center;
  flex-wrap: nowrap;
  min-height: 32px;
  margin-bottom: 6px;
}
.beat-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #414a5d;
  transition: background 0.06s, transform 0.06s;
}
.beat-dot.on {
  background: #00e5a0;
  transform: scale(1.45);
}

@media (max-width: 980px) {
  body { overflow: auto; min-height: 100dvh; }
  .media-stage { grid-template-columns: 1fr; flex: 0 0 auto; }
  .viz-container, .video-panel { min-height: 300px; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="pulse-dot"></div>
  <span class="title">BeatSight</span>
  <span class="subtitle">NUEVAYoL</span>
</div>

<div class="track-info">
  <span class="track-icon">♫</span>
  <span class="track-name" id="trackName">NUEVAYoL-BAD BUNNY</span>
  <span class="track-dur" id="trackDur">0:00</span>
</div>

<div class="mode-row">
  <button class="mode-btn active" data-mode="wave">WAVE</button>
  <button class="mode-btn" data-mode="bars">BARS</button>
  <button class="mode-btn" data-mode="radial">RADIAL</button>
  <button class="mode-btn" data-mode="spectrum">SPECTRUM</button>
  <button class="mode-btn" data-mode="scope">SCOPE</button>
  <button class="mode-btn" data-mode="mirror">MIRROR</button>
  <button class="mode-btn" data-mode="stereo">STEREO</button>
  <button class="mode-btn" data-mode="freq">FREQ</button>
  <button class="mode-btn" data-mode="stack">STACK</button>
  <button class="mode-btn" data-mode="line">LINE</button>
</div>

<div class="media-stage">
  <div class="viz-container">
    <canvas id="vizCanvas"></canvas>
    <div class="beat-flash" id="beatFlash"></div>
  </div>

  <div class="video-panel">
    <div class="video-zoom-controls">
      <button id="zoomOut" aria-label="Zoom out video">−</button>
      <button id="zoomIn" aria-label="Zoom in video">+</button>
    </div>
    <iframe
      id="youtubeFrame"
      class="youtube-frame"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
      src="https://www.youtube.com/embed/L-S3h8jWTEU?enablejsapi=1&playsinline=1&autoplay=0&mute=1&controls=1&rel=0&modestbranding=1">
    </iframe>
  </div>
</div>

<div class="controls">
  <button class="play-btn" id="playBtn" aria-label="Play or pause">
    <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <div class="progress-wrap">
    <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="totTime">0:00</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<div class="metrics">
  <div class="metric-card">
    <div class="metric-label">Beat Pulse</div>
    <div class="pulse-grid" id="beatDots">
      <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
      <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
    </div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Bass</div>
    <div class="metric-bar-wrap"><div class="metric-bar bass-bar" id="bassBar"></div></div>
    <div class="metric-val bass-val" id="bassVal">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Mid</div>
    <div class="metric-bar-wrap"><div class="metric-bar mid-bar" id="midBar"></div></div>
    <div class="metric-val mid-val" id="midVal">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">High</div>
    <div class="metric-bar-wrap"><div class="metric-bar high-bar" id="highBar"></div></div>
    <div class="metric-val high-val" id="highVal">0</div>
  </div>
</div>

<audio id="audioEl" preload="auto" crossorigin="anonymous" src="NUEVAYoL-BAD BUNNY.mp3"></audio>

<script>
let audioCtx = null;
let analyser = null;
let mediaSourceNode = null;
let vizMode = 'wave';
let beatHistory = [];
let lastBeatTime = 0;
let beatDotIndex = 0;
let lastBassLevel = 0;
let animationId = null;

const canvas = document.getElementById('vizCanvas');
const ctx2 = canvas.getContext('2d');
const audioEl = document.getElementById('audioEl');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const progressFill = document.getElementById('progressFill');
const curTimeEl = document.getElementById('curTime');
const totTimeEl = document.getElementById('totTime');
const trackDur = document.getElementById('trackDur');
const beatFlash = document.getElementById('beatFlash');
const beatDots = document.querySelectorAll('.beat-dot');
const bassBar = document.getElementById('bassBar');
const midBar = document.getElementById('midBar');
const highBar = document.getElementById('highBar');
const bassVal = document.getElementById('bassVal');
const midVal = document.getElementById('midVal');
const highVal = document.getElementById('highVal');
const progressBar = document.getElementById('progressBar');
const youtubeFrame = document.getElementById('youtubeFrame');
const zoomInBtn = document.getElementById('zoomIn');
const zoomOutBtn = document.getElementById('zoomOut');
let videoScale = 1;

function fmt(s) {
  s = Math.max(0, Math.floor(Number(s) || 0));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width));
  const h = Math.max(1, Math.floor(rect.height));
  canvas.width = w * dpr;
  canvas.height = h * dpr;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function ensureAudioEngine() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (!analyser) {
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;
    analyser.connect(audioCtx.destination);
  }
  if (!mediaSourceNode) {
    mediaSourceNode = audioCtx.createMediaElementSource(audioEl);
    mediaSourceNode.connect(analyser);
    mediaSourceNode.connect(audioCtx.destination);
  }
}

function muteYouTubeVideo() {
  try {
    youtubeFrame.contentWindow?.postMessage(JSON.stringify({
      event: 'command',
      func: 'mute',
      args: []
    }), '*');
    youtubeFrame.contentWindow?.postMessage(JSON.stringify({
      event: 'command',
      func: 'setVolume',
      args: [0]
    }), '*');
  } catch (e) {}
}

function playYouTubeVideo() {
  muteYouTubeVideo();
  youtubeFrame.contentWindow?.postMessage(JSON.stringify({
    event: 'command',
    func: 'playVideo',
    args: []
  }), '*');
  muteYouTubeVideo();
}

function pauseYouTubeVideo() {
  youtubeFrame.contentWindow?.postMessage(JSON.stringify({
    event: 'command',
    func: 'pauseVideo',
    args: []
  }), '*');
}

function seekYouTubeVideo(t) {
  muteYouTubeVideo();
  youtubeFrame.contentWindow?.postMessage(JSON.stringify({
    event: 'command',
    func: 'seekTo',
    args: [Math.max(0, Number(t) || 0), true]
  }), '*');
  muteYouTubeVideo();
}


function applyVideoZoom() {
  youtubeFrame.style.transform = `scale(${videoScale})`;
  youtubeFrame.style.transformOrigin = 'center center';
}

zoomInBtn.addEventListener('click', () => {
  videoScale = Math.min(2.5, videoScale + 0.2);
  applyVideoZoom();
});

zoomOutBtn.addEventListener('click', () => {
  videoScale = Math.max(0.6, videoScale - 0.2);
  applyVideoZoom();
});

youtubeFrame.addEventListener('load', () => {
  muteYouTubeVideo();
  setTimeout(muteYouTubeVideo, 400);
  setTimeout(muteYouTubeVideo, 1200);
});

audioEl.addEventListener('loadedmetadata', () => {
  const d = Number(audioEl.duration || 0);
  totTimeEl.textContent = fmt(d);
  trackDur.textContent = fmt(d);
});

audioEl.addEventListener('timeupdate', () => {
  const t = Number(audioEl.currentTime || 0);
  const d = Number(audioEl.duration || 0);
  curTimeEl.textContent = fmt(t);
  if (d > 0) {
    progressFill.style.width = Math.round((t / d) * 100) + '%';
    totTimeEl.textContent = fmt(d);
  }
});

audioEl.addEventListener('seeked', () => {
  seekYouTubeVideo(audioEl.currentTime || 0);
});

audioEl.addEventListener('play', () => {
  playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  playYouTubeVideo();
  startDraw();
});

audioEl.addEventListener('pause', () => {
  playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  pauseYouTubeVideo();
});

audioEl.addEventListener('ended', () => {
  playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  pauseYouTubeVideo();
  seekYouTubeVideo(0);
  curTimeEl.textContent = '0:00';
  progressFill.style.width = '0%';
});

playBtn.addEventListener('click', async () => {
  ensureAudioEngine();
  if (audioCtx.state === 'suspended') {
    try { await audioCtx.resume(); } catch (e) {}
  }
  if (audioEl.paused || audioEl.ended) {
    try { await audioEl.play(); } catch (e) { console.error(e); }
  } else {
    audioEl.pause();
  }
});

progressBar.addEventListener('click', e => {
  const d = Number(audioEl.duration || 0);
  if (!d) return;
  const rect = progressBar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioEl.currentTime = ratio * d;
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    vizMode = btn.dataset.mode;
  });
});

function startDraw() {
  cancelAnimationFrame(animationId);
  draw();
}

function draw() {
  animationId = requestAnimationFrame(draw);
  if (!analyser) return;

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;

  const bufLen = analyser.frequencyBinCount;
  const freqData = new Uint8Array(bufLen);
  const timeData = new Uint8Array(analyser.fftSize);
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const bassEnd = Math.max(1, Math.floor(bufLen * 0.05));
  const midEnd = Math.max(bassEnd + 1, Math.floor(bufLen * 0.30));
  let bSum = 0, mSum = 0, hSum = 0;
  for (let i = 0; i < bassEnd; i++) bSum += freqData[i];
  for (let i = bassEnd; i < midEnd; i++) mSum += freqData[i];
  for (let i = midEnd; i < bufLen; i++) hSum += freqData[i];

  const bassLvl = Math.round(bSum / bassEnd);
  const midLvl = Math.round(mSum / Math.max(1, midEnd - bassEnd));
  const highLvl = Math.round(hSum / Math.max(1, bufLen - midEnd));

  bassBar.style.width = Math.round(bassLvl / 2.55) + '%';
  midBar.style.width = Math.round(midLvl / 2.55) + '%';
  highBar.style.width = Math.round(highLvl / 2.55) + '%';
  bassVal.textContent = bassLvl;
  midVal.textContent = midLvl;
  highVal.textContent = highLvl;

  if (bassLvl > 110 && bassLvl > lastBassLevel * 1.12) {
    const now = performance.now();
    if (now - lastBeatTime > 220) {
      lastBeatTime = now;
      beatFlash.style.opacity = '1';
      setTimeout(() => beatFlash.style.opacity = '0', 90);
      const di = beatDotIndex % 8;
      beatDots[di].classList.add('on');
      setTimeout(() => beatDots[di].classList.remove('on'), 220);
      beatDotIndex++;
    }
  }
  lastBassLevel = bassLvl;

  ctx2.save();
  ctx2.scale(dpr, dpr);
  ctx2.clearRect(0, 0, W, H);

  if (vizMode === 'wave') drawWave(timeData, W, H, bassLvl);
  else if (vizMode === 'bars') drawBars(freqData, W, H);
  else if (vizMode === 'radial') drawRadial(freqData, timeData, W, H, bassLvl);
  else if (vizMode === 'mirror') drawMirror(freqData, W, H);
  else if (vizMode === 'spectrum') drawSpectrum(freqData, W, H);
  else if (vizMode === 'scope') drawScope(timeData, W, H);
  else if (vizMode === 'stereo') drawStereo(freqData, W, H);
  else if (vizMode === 'freq') drawFreq(freqData, W, H);
  else if (vizMode === 'stack') drawStack(freqData, W, H);
  else if (vizMode === 'line') drawLine(freqData, W, H);
  else drawWave(timeData, W, H, bassLvl);

  ctx2.restore();
}

function drawBackground(W, H, alpha = 0.22) {
  const grad = ctx2.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, `rgba(0,229,160,${alpha})`);
  grad.addColorStop(0.5, 'rgba(0,180,255,0.06)');
  grad.addColorStop(1, 'rgba(255,77,109,0.10)');
  ctx2.fillStyle = grad;
  ctx2.fillRect(0, 0, W, H);
}

function drawWave(timeData, W, H, bassLvl) {
  drawBackground(W, H, 0.14);
  const boost = bassLvl / 255;
  const layers = [
    { color:'#00e5a0', alpha:1.0, yOff:0 },
    { color:'#00b4ff', alpha:0.3, yOff:5*boost },
    { color:'#ff4d6d', alpha:0.15, yOff:-5*boost }
  ];
  layers.forEach(l => {
    ctx2.globalAlpha = l.alpha;
    ctx2.strokeStyle = l.color;
    ctx2.lineWidth = 2.2;
    ctx2.beginPath();
    const sliceW = W / timeData.length;
    for (let i = 0; i < timeData.length; i++) {
      const v = (timeData[i] / 128.0) - 1;
      const x = i * sliceW;
      const y = H / 2 + v * H / 2 * (0.85 + boost * 0.45) + l.yOff;
      if (i === 0) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
    }
    ctx2.stroke();
  });
  ctx2.globalAlpha = 1;
}

function drawBars(freqData, W, H) {
  drawBackground(W, H, 0.12);
  const barCount = 80;
  const slot = W / barCount;
  const barW = slot * 0.72;
  for (let i = 0; i < barCount; i++) {
    const idx = Math.floor(i / barCount * freqData.length * 0.65);
    const v = freqData[idx] / 255;
    const barH = v * H * 0.95;
    const x = i * slot + (slot - barW) / 2;
    const t = i / barCount;
    const color = t < 0.45 ? '#00e5a0' : t < 0.78 ? '#ffd166' : '#ff4d6d';
    ctx2.fillStyle = color;
    ctx2.beginPath();
    ctx2.roundRect(x, H - barH, barW, barH, [3,3,0,0]);
    ctx2.fill();
  }
}

function drawRadial(freqData, timeData, W, H, bassLvl) {
  drawBackground(W, H, 0.10);
  const cx = W / 2, cy = H / 2;
  const baseR = Math.min(W, H) * 0.22;
  const boost = bassLvl / 255;
  for (let i = 0; i < 90; i++) {
    const idx = Math.floor(i / 90 * freqData.length * 0.7);
    const v = freqData[idx] / 255;
    const angle = (i / 90) * Math.PI * 2 - Math.PI / 2;
    const r1 = baseR, r2 = baseR + v * baseR * 1.2;
    const x1 = cx + Math.cos(angle) * r1;
    const y1 = cy + Math.sin(angle) * r1;
    const x2 = cx + Math.cos(angle) * r2;
    const y2 = cy + Math.sin(angle) * r2;
    const t = i / 90;
    ctx2.strokeStyle = t < 0.45 ? '#00e5a0' : t < 0.78 ? '#ffd166' : '#ff4d6d';
    ctx2.lineWidth = 2;
    ctx2.beginPath();
    ctx2.moveTo(x1, y1);
    ctx2.lineTo(x2, y2);
    ctx2.stroke();
  }
  ctx2.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx2.lineWidth = 1;
  ctx2.beginPath();
  ctx2.arc(cx, cy, baseR + boost * 12, 0, Math.PI * 2);
  ctx2.stroke();
}

function drawMirror(freqData, W, H) {
  drawBackground(W, H, 0.12);
  const bars = 44;
  const halfW = W / 2;
  const slot = halfW / bars;
  const barW = slot * 0.66;
  for (let i = 0; i < bars; i++) {
    const idx = Math.floor(i / bars * freqData.length * 0.75);
    const v = freqData[idx] / 255;
    const h = Math.max(3, v * H * 0.82);
    const leftX = halfW - (i + 1) * slot + (slot - barW) / 2;
    const rightX = halfW + i * slot + (slot - barW) / 2;
    const color = i < bars * 0.45 ? '#00e5a0' : i < bars * 0.78 ? '#ffd166' : '#ff4d6d';
    ctx2.fillStyle = color;
    ctx2.beginPath();
    ctx2.roundRect(leftX, H - h, barW, h, 6);
    ctx2.fill();
    ctx2.beginPath();
    ctx2.roundRect(rightX, H - h, barW, h, 6);
    ctx2.fill();
  }
}

function drawSpectrum(freqData, W, H) {
  drawBackground(W, H, 0.14);
  const lines = 64;
  const slot = W / lines;
  for (let i = 0; i < lines; i++) {
    const idx = Math.floor(i / lines * freqData.length * 0.85);
    const v = freqData[idx] / 255;
    const x = i * slot + slot / 2;
    const y = H - v * H * 0.88;
    ctx2.strokeStyle = i < lines * 0.45 ? '#00e5a0' : i < lines * 0.8 ? '#ffd166' : '#ff4d6d';
    ctx2.lineWidth = Math.max(2, slot * 0.45);
    ctx2.beginPath();
    ctx2.moveTo(x, H - 8);
    ctx2.lineTo(x, y);
    ctx2.stroke();
  }
}

function drawScope(timeData, W, H) {
  drawBackground(W, H, 0.08);
  ctx2.strokeStyle = '#00e5a0';
  ctx2.lineWidth = 2.4;
  ctx2.beginPath();
  const slice = W / timeData.length;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] / 128.0) - 1;
    const x = i * slice;
    const y = H / 2 + v * H * 0.42;
    if (i === 0) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
  }
  ctx2.stroke();
}

function drawStereo(freqData, W, H) {
  drawBackground(W, H, 0.10);
  const half = H / 2;
  const bars = 40;
  const slot = W / bars;
  const barW = slot * 0.62;
  for (let i = 0; i < bars; i++) {
    const idx = Math.floor(i / bars * freqData.length * 0.7);
    const v = freqData[idx] / 255;
    const h = Math.max(3, v * half * 0.92);
    const x = i * slot + (slot - barW) / 2;
    const color = i < bars * 0.45 ? '#00e5a0' : i < bars * 0.75 ? '#ffd166' : '#ff4d6d';
    ctx2.fillStyle = color;
    ctx2.beginPath();
    ctx2.roundRect(x, half - h, barW, h, 5);
    ctx2.fill();
    ctx2.beginPath();
    ctx2.roundRect(x, half, barW, h, 5);
    ctx2.fill();
  }
}

function drawFreq(freqData, W, H) {
  drawBackground(W, H, 0.12);
  const groups = 24;
  const usable = Math.floor(freqData.length * 0.72);
  const groupSize = Math.max(1, Math.floor(usable / groups));
  const slot = W / groups;
  const barW = Math.max(4, slot * 0.68);
  for (let i = 0; i < groups; i++) {
    let sum = 0;
    const start = i * groupSize;
    const end = Math.min(usable, start + groupSize);
    for (let j = start; j < end; j++) sum += freqData[j];
    const avg = sum / Math.max(1, end - start);
    const v = avg / 255;
    const barH = Math.max(4, v * (H - 26));
    const x = i * slot + (slot - barW) / 2;
    const y = H - barH - 8;
    const t = i / (groups - 1);
    ctx2.fillStyle = t < 0.45 ? '#00e5a0' : t < 0.78 ? '#ffd166' : '#ff4d6d';
    ctx2.beginPath();
    ctx2.roundRect(x, y, barW, barH, 6);
    ctx2.fill();
  }
}

function drawStack(freqData, W, H) {
  drawBackground(W, H, 0.12);
  const bands = 30;
  const slice = Math.max(1, Math.floor(freqData.length / bands));
  const barW = W / bands;
  for (let i = 0; i < bands; i++) {
    let sum = 0;
    const start = i * slice;
    const end = Math.min(freqData.length, (i + 1) * slice);
    for (let j = start; j < end; j++) sum += freqData[j];
    const avg = sum / Math.max(1, end - start);
    const h = (avg / 255) * H * 0.9;
    ctx2.fillStyle = 'rgba(255,255,255,0.08)';
    ctx2.fillRect(i * barW, H - h, barW - 2, h);
    ctx2.fillStyle = '#00e5a0';
    ctx2.fillRect(i * barW, H - h, barW - 2, h * 0.5);
    ctx2.fillStyle = '#ffd166';
    ctx2.fillRect(i * barW, H - h * 0.5, barW - 2, h * 0.25);
    ctx2.fillStyle = '#ff4d6d';
    ctx2.fillRect(i * barW, H - h * 0.25, barW - 2, h * 0.25);
  }
}

function drawLine(freqData, W, H) {
  drawBackground(W, H, 0.10);
  const usable = Math.floor(freqData.length * 0.72);
  const step = W / usable;
  ctx2.strokeStyle = '#00e5a0';
  ctx2.lineWidth = 2.2;
  ctx2.beginPath();
  for (let i = 0; i < usable; i++) {
    const v = freqData[i] / 255;
    const x = i * step;
    const y = H - v * H * 0.8;
    if (i === 0) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
  }
  ctx2.stroke();
}
